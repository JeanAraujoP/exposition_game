<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMaster Quiz — Buenas Prácticas</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-deep:   #0d0014;
      --purple-dark:   #1a0030;
      --purple-mid:    #3d0066;
      --purple-bright: #8b00ff;
      --purple-neon:   #cc44ff;
      --blue-dark:     #000c1a;
      --blue-mid:      #003366;
      --blue-bright:   #0066ff;
      --blue-neon:     #00aaff;
      --gold:          #ffd700;
      --gold-light:    #fff0a0;
      --white:         #f0eeff;
      --correct:       #00e676;
      --wrong:         #ff1744;
      --font-display:  'Orbitron', sans-serif;
      --font-body:     'Rajdhani', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--purple-deep);
      color: var(--white);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* ── STARFIELD ── */
    #stars-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── LAYOUT ── */
    .game-wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 40px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeDown .8s ease both;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 4vw, 2.6rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--purple-neon), var(--blue-neon), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none;
      letter-spacing: 4px;
      line-height: 1.1;
    }
    .logo-sub {
      font-family: var(--font-body);
      font-size: .85rem;
      letter-spacing: 6px;
      color: var(--blue-neon);
      opacity: .7;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ── HUD ── */
    .hud {
      width: 100%; max-width: 860px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
      animation: fadeDown .9s .1s ease both;
    }
    .hud-score {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--gold);
      white-space: nowrap;
      text-shadow: 0 0 12px var(--gold);
      min-width: 120px;
    }
    .progress-track {
      flex: 1; height: 10px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(140,80,255,.3);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple-neon), var(--blue-neon));
      border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px var(--blue-neon);
    }
    .hud-timer {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--blue-neon);
      text-shadow: 0 0 14px var(--blue-neon);
      min-width: 54px;
      text-align: right;
    }
    .hud-timer.urgent { color: var(--wrong); text-shadow: 0 0 18px var(--wrong); animation: pulse .5s infinite; }

    /* ── QUESTION CARD ── */
    .question-card {
      width: 100%; max-width: 860px;
      background: linear-gradient(145deg, rgba(30,0,55,.85), rgba(0,15,40,.85));
      border: 1px solid rgba(140,80,255,.35);
      border-radius: 20px;
      padding: clamp(22px,5vw,40px);
      box-shadow:
        0 0 40px rgba(139,0,255,.18),
        0 0 80px rgba(0,100,255,.08),
        inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(12px);
      animation: cardIn .6s .15s cubic-bezier(.23,1,.32,1) both;
      position: relative;
      overflow: hidden;
    }
    .question-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(from 200deg, transparent 60%, rgba(139,0,255,.06) 70%, transparent 80%);
      animation: rotateBg 8s linear infinite;
      pointer-events: none;
    }

    .q-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px;
    }
    .q-number-badge {
      font-family: var(--font-display);
      font-size: .65rem;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--purple-mid), var(--blue-mid));
      border: 1px solid var(--purple-neon);
      color: var(--purple-neon);
      text-shadow: 0 0 8px var(--purple-neon);
      white-space: nowrap;
    }
    .q-category {
      font-size: .78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue-neon);
      opacity: .65;
    }
    .q-prize {
      margin-left: auto;
      font-family: var(--font-display);
      font-size: .85rem;
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold);
    }

    .question-text {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 600;
      line-height: 1.55;
      color: var(--white);
      margin-bottom: 22px;
      position: relative; z-index: 1;
    }

    /* Code snippet inside question */
    .code-block {
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(140,80,255,.3);
      border-left: 3px solid var(--purple-neon);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: .9rem;
      color: #c3b1ff;
      margin: 12px 0;
      white-space: pre;
      overflow-x: auto;
    }
    .code-block .kw  { color: #cc44ff; }
    .code-block .var { color: #00aaff; }
    .code-block .str { color: #00e676; }

    /* ── OPTIONS GRID ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      position: relative; z-index: 1;
    }
    @media(max-width: 540px) { .options-grid { grid-template-columns: 1fr; } }

    .option-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(140,80,255,.3);
      border-radius: 12px;
      cursor: pointer;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .option-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(139,0,255,.12), rgba(0,100,255,.08));
      opacity: 0;
      transition: opacity .22s;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--blue-neon);
      box-shadow: 0 0 20px rgba(0,170,255,.35), 0 0 40px rgba(0,170,255,.1);
      transform: translateY(-2px) scale(1.015);
    }
    .option-btn:hover:not(:disabled)::after { opacity: 1; }

    .option-label {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple-mid), var(--blue-mid));
      border: 1.5px solid var(--purple-neon);
      font-family: var(--font-display);
      font-size: .7rem;
      font-weight: 700;
      color: var(--purple-neon);
      flex-shrink: 0;
      transition: all .22s;
    }
    .option-btn:hover:not(:disabled) .option-label {
      background: linear-gradient(135deg, var(--blue-mid), var(--blue-bright));
      border-color: var(--blue-neon);
      color: var(--blue-neon);
      box-shadow: 0 0 12px rgba(0,170,255,.5);
    }

    .option-btn.correct {
      border-color: var(--correct) !important;
      background: rgba(0,230,118,.12) !important;
      box-shadow: 0 0 24px rgba(0,230,118,.4), 0 0 48px rgba(0,230,118,.15) !important;
      animation: correctPop .4s cubic-bezier(.23,1,.32,1);
    }
    .option-btn.correct .option-label {
      background: var(--correct);
      border-color: var(--correct);
      color: #000;
      box-shadow: 0 0 14px var(--correct);
    }
    .option-btn.wrong {
      border-color: var(--wrong) !important;
      background: rgba(255,23,68,.12) !important;
      box-shadow: 0 0 24px rgba(255,23,68,.4) !important;
      animation: shake .4s cubic-bezier(.36,.07,.19,.97);
    }
    .option-btn.wrong .option-label {
      background: var(--wrong);
      border-color: var(--wrong);
      color: #fff;
    }
    .option-btn:disabled { cursor: not-allowed; opacity: .85; }

    /* ── LIFELINES ── */
    .lifelines {
      width: 100%; max-width: 860px;
      display: flex; gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      animation: fadeUp .8s .25s ease both;
    }
    .lifeline-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border-radius: 99px;
      background: rgba(61,0,102,.4);
      border: 1px solid rgba(204,68,255,.35);
      color: var(--purple-neon);
      font-family: var(--font-body);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }
    .lifeline-btn:hover:not(:disabled) {
      background: rgba(61,0,102,.7);
      border-color: var(--purple-neon);
      box-shadow: 0 0 14px rgba(204,68,255,.4);
    }
    .lifeline-btn:disabled { opacity: .3; cursor: not-allowed; }
    .lifeline-icon { font-size: 1rem; }

    /* ── PRIZE LADDER ── */
    .prize-ladder {
      width: 100%; max-width: 860px;
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 6px;
      animation: fadeUp .8s .3s ease both;
    }
    .ladder-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      font-size: .78rem;
      transition: all .3s;
    }
    .ladder-item.active {
      background: rgba(139,0,255,.18);
      border-color: var(--purple-neon);
      box-shadow: 0 0 14px rgba(204,68,255,.25);
    }
    .ladder-item.done {
      background: rgba(0,230,118,.08);
      border-color: rgba(0,230,118,.3);
    }
    .ladder-num { color: rgba(255,255,255,.4); font-size: .7rem; }
    .ladder-pts { font-family: var(--font-display); font-size: .75rem; color: var(--gold); }

    /* ── FEEDBACK TOAST ── */
    .feedback-toast {
      position: fixed;
      top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.6);
      z-index: 100;
      padding: 20px 36px;
      border-radius: 16px;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: all .3s cubic-bezier(.23,1,.32,1);
    }
    .feedback-toast.show {
      opacity: 1; transform: translate(-50%,-50%) scale(1);
    }
    .feedback-toast.good {
      background: rgba(0,230,118,.15);
      border: 2px solid var(--correct);
      color: var(--correct);
      box-shadow: 0 0 60px rgba(0,230,118,.4);
    }
    .feedback-toast.bad {
      background: rgba(255,23,68,.15);
      border: 2px solid var(--wrong);
      color: var(--wrong);
      box-shadow: 0 0 60px rgba(255,23,68,.4);
    }

    /* ── PARTICLES ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99;
      animation: particleFly 1s ease-out forwards;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform:none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(20px);  } to { opacity:1; transform:none; } }
    @keyframes cardIn   { from { opacity:0; transform: scale(.94) translateY(30px); } to { opacity:1; transform:none; } }
    @keyframes rotateBg { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes correctPop { 0%{transform:scale(1)} 40%{transform:scale(1.04)} 70%{transform:scale(.98)} 100%{transform:scale(1)} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    @keyframes particleFly {
      0%   { transform: translate(0,0) scale(1); opacity:1; }
      100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity:0; }
    }
    @keyframes timerTick { from{stroke-dashoffset:0} to{stroke-dashoffset:283} }

    /* ── FINISH CARD ── */
    .finish-card {
      width: 100%; max-width: 500px;
      background: linear-gradient(145deg, rgba(30,0,55,.9), rgba(0,15,40,.9));
      border: 1px solid rgba(140,80,255,.4);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      display: none;
      animation: cardIn .6s cubic-bezier(.23,1,.32,1) both;
      box-shadow: 0 0 60px rgba(139,0,255,.25);
    }
    .finish-icon { font-size: 4rem; margin-bottom: 16px; }
    .finish-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--purple-neon), var(--blue-neon));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .finish-score {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--gold);
      text-shadow: 0 0 30px var(--gold);
      margin: 16px 0;
    }
    .finish-msg { font-size: 1rem; color: rgba(255,255,255,.6); margin-bottom: 28px; line-height: 1.5; }
    .btn-restart {
      padding: 14px 40px;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--purple-mid), var(--blue-mid));
      border: 1.5px solid var(--purple-neon);
      color: var(--white);
      font-family: var(--font-display);
      font-size: .85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all .25s;
    }
    .btn-restart:hover {
      box-shadow: 0 0 24px rgba(204,68,255,.5);
      transform: translateY(-2px);
      background: linear-gradient(135deg, var(--purple-bright), var(--blue-bright));
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="game-wrapper" id="game-wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-text">CodeMaster Quiz</div>
    <div class="logo-sub">Buenas Prácticas de Nomenclatura</div>
  </header>

  <!-- HUD -->
  <div class="hud" id="hud">
    <div class="hud-score" id="score-display">⭐ 0 pts</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="hud-timer" id="timer-display">30</div>
  </div>

  <!-- QUESTION CARD -->
  <div class="question-card" id="question-card">
    <div class="q-meta">
      <span class="q-number-badge" id="q-badge">PREGUNTA 1 / 10</span>
      <span class="q-category" id="q-category">VARIABLES</span>
      <span class="q-prize" id="q-prize">💰 100 pts</span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options-grid" id="options-grid"></div>
  </div>

  <!-- LIFELINES -->
  <div class="lifelines" id="lifelines">
    <button class="lifeline-btn" id="ll-50" onclick="useLifeline50()">
      <span class="lifeline-icon">✂️</span> 50:50
    </button>
    <button class="lifeline-btn" id="ll-skip" onclick="useLifelineSkip()">
      <span class="lifeline-icon">⏭️</span> Saltar
    </button>
    <button class="lifeline-btn" id="ll-hint" onclick="useLifelineHint()">
      <span class="lifeline-icon">💡</span> Pista
    </button>
  </div>

  <!-- PRIZE LADDER -->
  <div class="prize-ladder" id="prize-ladder"></div>

  <!-- FINISH CARD -->
  <div class="finish-card" id="finish-card">
    <div class="finish-icon" id="finish-icon">🏆</div>
    <div class="finish-title">Juego Terminado</div>
    <div class="finish-score" id="finish-score">0 pts</div>
    <div class="finish-msg" id="finish-msg"></div>
    <button class="btn-restart" onclick="restartGame()">JUGAR DE NUEVO</button>
  </div>

</div>

<!-- FEEDBACK TOAST -->
<div class="feedback-toast" id="feedback-toast"></div>

<script>
/* ── QUESTIONS DATABASE ── */
const QUESTIONS = [
  {
    category: "VARIABLES",
    prize: 100,
    text: "¿Cuál es el mejor nombre para una variable que almacena la <strong>edad de un usuario</strong>?",
    options: ["x", "n", "edadUsuario", "tmp"],
    correct: 2
  },
  {
    category: "CONVENCIONES",
    prize: 200,
    text: "¿Qué error existe en este código?",
    code: `let user_name;\nlet edadUsuario;`,
    options: [
      "No hay ningún error",
      "Mezcla de convenciones de nombres",
      "Las variables no están inicializadas",
      "El tipo de dato es incorrecto"
    ],
    correct: 1
  },
  {
    category: "CLARIDAD",
    prize: 300,
    text: "¿Cuál nombre de función es más claro y describe mejor su propósito?",
    options: ["calcTtl", "calc", "calcularTotal", "ct"],
    correct: 2
  },
  {
    category: "BOOLEANOS",
    prize: 500,
    text: "¿Cuál variable booleana está <strong>correctamente nombrada</strong> según las convenciones estándar?",
    options: ["active", "usuario", "isActive", "data"],
    correct: 2
  },
  {
    category: "CLASES",
    prize: 1000,
    text: "¿Cuál es la convención correcta para nombrar una <strong>clase</strong> en la mayoría de lenguajes orientados a objetos?",
    options: ["usuario_perfil", "usuarioPerfil", "USUARIO_PERFIL", "UsuarioPerfil"],
    correct: 3
  },
  {
    category: "FUNCIONES",
    prize: 2000,
    text: "¿Cuál es el error en este nombre de función?",
    code: `function d(u) {\n  return u.name;\n}`,
    options: [
      "Falta el punto y coma",
      "El nombre 'd' no describe qué hace la función",
      "El parámetro debería ser un array",
      "No hay error, es válido"
    ],
    correct: 1
  },
  {
    category: "CONSTANTES",
    prize: 4000,
    text: "¿Cómo se deben nombrar las <strong>constantes globales</strong> según la convención más extendida?",
    options: ["miConstante", "MiConstante", "MI_CONSTANTE", "miconstante"],
    correct: 2
  },
  {
    category: "ABREVIACIONES",
    prize: 8000,
    text: "¿Cuál de estas variables tiene un nombre que puede generar confusión en un equipo de desarrollo?",
    options: ["calcularDescuento", "totalProductos", "usrNm", "obtenerPrecio"],
    correct: 2
  },
  {
    category: "PREFIJOS",
    prize: 16000,
    text: "Selecciona el nombre <strong>más descriptivo</strong> para una función que comprueba si un usuario tiene permisos de administrador:",
    options: ["permiso()", "check()", "verificar()", "hasAdminPermissions()"],
    correct: 3
  },
  {
    category: "BUENAS PRÁCTICAS",
    prize: 32000,
    text: "¿Cuál fragmento de código sigue <strong>mejor</strong> las convenciones de nomenclatura?",
    code: `// Opción A\nconst d = new Date();\nconst u = getUser();\n\n// Opción B\nconst currentDate = new Date();\nconst currentUser = getUser();`,
    options: [
      "Opción A — es más corta",
      "Opción B — los nombres son descriptivos",
      "Ambas son igualmente válidas",
      "Ninguna sigue las convenciones"
    ],
    correct: 1
  }
];

const PRIZES = [100,200,300,500,1000,2000,4000,8000,16000,32000];
const LABELS = ['A','B','C','D'];

/* ── GAME STATE ── */
let state = {
  current: 0,
  score: 0,
  timer: 30,
  timerInterval: null,
  answered: false,
  ll50Used: false,
  llSkipUsed: false,
  llHintUsed: false,
  hiddenOptions: []
};

/* ── STARS ── */
(function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = Array.from({ length: 180 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + .2,
      a: Math.random(),
      speed: Math.random() * .004 + .001,
      color: Math.random() > .6 ? '#cc44ff' : Math.random() > .5 ? '#00aaff' : '#ffffff'
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = (Math.sin(s.a) + 1) / 2 * .8 + .1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createStars(); });
  resize(); createStars(); draw();
})();

/* ── BUILD PRIZE LADDER ── */
function buildLadder() {
  const el = document.getElementById('prize-ladder');
  el.innerHTML = PRIZES.map((p, i) => `
    <div class="ladder-item" id="ladder-${i}">
      <span class="ladder-num">${i + 1}</span>
      <span class="ladder-pts">💰 ${p.toLocaleString()}</span>
    </div>`).join('');
}

function updateLadder() {
  PRIZES.forEach((_, i) => {
    const el = document.getElementById(`ladder-${i}`);
    el.className = 'ladder-item';
    if (i < state.current) el.classList.add('done');
    if (i === state.current) el.classList.add('active');
  });
}

/* ── RENDER QUESTION ── */
function renderQuestion() {
  const q = QUESTIONS[state.current];
  const total = QUESTIONS.length;

  document.getElementById('q-badge').textContent = `PREGUNTA ${state.current + 1} / ${total}`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-prize').textContent = `💰 ${q.prize.toLocaleString()} pts`;

  // Question text + optional code
  let html = q.text;
  if (q.code) {
    const highlighted = q.code
      .replace(/\b(let|const|function|return|new)\b/g, '<span class="kw">$1</span>')
      .replace(/\/\/.*/g, m => `<span class="str">${m}</span>`);
    html += `<div class="code-block">${highlighted}</div>`;
  }
  document.getElementById('question-text').innerHTML = html;

  // Options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">
      <span class="option-label">${LABELS[i]}</span>
      <span>${opt}</span>
    </button>`).join('');

  // Update HUD
  const pct = (state.current / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('score-display').textContent = `⭐ ${state.score.toLocaleString()} pts`;

  state.answered = false;
  state.hiddenOptions = [];
  startTimer();
  updateLadder();
}

/* ── TIMER ── */
function startTimer() {
  clearInterval(state.timerInterval);
  state.timer = 30;
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerDisplay();
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      timeUp();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  el.textContent = state.timer;
  el.className = 'hud-timer' + (state.timer <= 10 ? ' urgent' : '');
}

function timeUp() {
  if (state.answered) return;
  state.answered = true;
  disableOptions();
  showFeedback('⏱️ ¡Tiempo agotado!', 'bad');
  highlightCorrect();
  setTimeout(() => redirectResult(false), 1800);
}

/* ── SELECT OPTION ── */
function selectOption(idx) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const q = QUESTIONS[state.current];
  const isCorrect = idx === q.correct;

  document.getElementById(`opt-${idx}`).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) highlightCorrect();

  disableOptions();

  if (isCorrect) {
    state.score += q.prize;
    spawnParticles(true);
    showFeedback('✅ ¡Correcto!', 'good');
  } else {
    spawnParticles(false);
    showFeedback('❌ Incorrecto', 'bad');
  }

  setTimeout(() => {
    hideFeedback();
    redirectResult(isCorrect);
  }, 1600);
}

function highlightCorrect() {
  const q = QUESTIONS[state.current];
  document.getElementById(`opt-${q.correct}`).classList.add('correct');
}

function disableOptions() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

/* ── REDIRECT ── */
function redirectResult(correct) {
  localStorage.setItem('codemaster_score', state.score);
  localStorage.setItem('codemaster_current', state.current);
  localStorage.setItem('codemaster_total', QUESTIONS.length);
  localStorage.setItem('codemaster_correct', correct ? '1' : '0');
  window.location.href = `resultado.html?estado=${correct ? 'bien' : 'mal'}`;
}

/* ── LIFELINES ── */
function useLifeline50() {
  if (state.ll50Used || state.answered) return;
  state.ll50Used = true;
  document.getElementById('ll-50').disabled = true;

  const q = QUESTIONS[state.current];
  const wrong = [];
  for (let i = 0; i < 4; i++) if (i !== q.correct) wrong.push(i);
  // Hide 2 wrong
  const toHide = wrong.sort(() => Math.random() - .5).slice(0, 2);
  toHide.forEach(i => {
    const btn = document.getElementById(`opt-${i}`);
    btn.style.opacity = '.15';
    btn.disabled = true;
    state.hiddenOptions.push(i);
  });
}

function useLifelineSkip() {
  if (state.llSkipUsed || state.answered) return;
  state.llSkipUsed = true;
  document.getElementById('ll-skip').disabled = true;
  clearInterval(state.timerInterval);
  state.answered = true;
  showFeedback('⏭️ Saltando...', 'good');
  setTimeout(() => { hideFeedback(); advanceGame(false, true); }, 900);
}

function useLifelineHint() {
  if (state.llHintUsed || state.answered) return;
  state.llHintUsed = true;
  document.getElementById('ll-hint').disabled = true;
  const q = QUESTIONS[state.current];
  const hints = [
    "Piensa en nombres descriptivos y completos.",
    "Las convenciones facilitan el trabajo en equipo.",
    "Los prefijos is/has/can ayudan en booleanos.",
    "Un buen nombre evita la necesidad de comentarios.",
    "SCREAMING_SNAKE_CASE se usa para constantes."
  ];
  const hint = hints[state.current % hints.length];
  showFeedback(`💡 ${hint}`, 'good');
  setTimeout(hideFeedback, 2400);
}

/* ── ADVANCE ── */
function advanceGame(isCorrect, skipped = false) {
  if (!skipped && isCorrect) state.score += QUESTIONS[state.current].prize;

  state.current++;
  if (state.current >= QUESTIONS.length) {
    showFinish();
  } else {
    // Re-render (used when jumping back from resultado.html re-integration)
    renderQuestion();
  }
}

/* ── FINISH SCREEN ── */
function showFinish() {
  document.getElementById('question-card').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('lifelines').style.display = 'none';
  document.getElementById('prize-ladder').style.display = 'none';

  const card = document.getElementById('finish-card');
  card.style.display = 'block';

  const pct = Math.round((state.score / PRIZES.reduce((a,b) => a+b, 0)) * 100);
  document.getElementById('finish-score').textContent = `${state.score.toLocaleString()} pts`;

  let icon = '🏆', msg = '';
  if (pct >= 80) { icon = '🏆'; msg = '¡Eres un experto en nomenclatura! Excelente dominio de las buenas prácticas.'; }
  else if (pct >= 50) { icon = '🎯'; msg = 'Buen trabajo. Continúa practicando para perfeccionar tus habilidades.'; }
  else { icon = '📚'; msg = 'Necesitas repasar las convenciones de nomenclatura. ¡No te rindas!'; }

  document.getElementById('finish-icon').textContent = icon;
  document.getElementById('finish-msg').textContent = msg;
  spawnParticles(pct >= 50);
}

function restartGame() {
  state = { current:0, score:0, timer:30, timerInterval:null, answered:false, ll50Used:false, llSkipUsed:false, llHintUsed:false, hiddenOptions:[] };
  ['ll-50','ll-skip','ll-hint'].forEach(id => document.getElementById(id).disabled = false);

  document.getElementById('finish-card').style.display = 'none';
  document.getElementById('question-card').style.display = '';
  document.getElementById('hud').style.display = '';
  document.getElementById('lifelines').style.display = '';
  document.getElementById('prize-ladder').style.display = '';

  renderQuestion();
}

/* ── FEEDBACK TOAST ── */
function showFeedback(msg, type) {
  const el = document.getElementById('feedback-toast');
  el.textContent = msg;
  el.className = `feedback-toast ${type} show`;
}
function hideFeedback() {
  document.getElementById('feedback-toast').className = 'feedback-toast';
}

/* ── PARTICLES ── */
function spawnParticles(good) {
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 10 + 5;
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 160 + 60;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${window.innerWidth/2}px; top:${window.innerHeight/2}px;
      background:${good ? (Math.random()>.5?'#00e676':'#00aaff') : (Math.random()>.5?'#ff1744':'#ff6d00')};
      --dx:${Math.cos(angle)*dist}px; --dy:${Math.sin(angle)*dist}px;
      opacity:.9;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

/* ── CHECK IF RETURNING FROM resultado.html ── */
function checkReturn() {
  const savedCurrent = parseInt(localStorage.getItem('codemaster_current') ?? -1);
  const savedScore   = parseInt(localStorage.getItem('codemaster_score') ?? 0);
  const wasCorrect   = localStorage.getItem('codemaster_correct') === '1';

  if (savedCurrent >= 0 && savedCurrent < QUESTIONS.length) {
    state.current = savedCurrent + 1;
    state.score = savedScore + (wasCorrect ? QUESTIONS[savedCurrent].prize : 0);
    localStorage.removeItem('codemaster_current');
    localStorage.removeItem('codemaster_score');
    localStorage.removeItem('codemaster_correct');
    localStorage.removeItem('codemaster_total');
  }

  if (state.current >= QUESTIONS.length) {
    showFinish();
  } else {
    renderQuestion();
  }
}

/* ── INIT ── */
buildLadder();
checkReturn();
</script>
